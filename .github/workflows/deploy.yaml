name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/mirmozin-ini8/dummy-app-backend
  FRONTEND_IMAGE: ghcr.io/mirmozin-ini8/dummy-app-frontend

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mirmozin-ini8 --password-stdin

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:latest ./backend
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.K3S_URL }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=mirmozin-ini8 \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/dummy-backend --timeout=120s
          kubectl rollout status deployment/dummy-frontend --timeout=120s

      - name: Verify health
        run: |
          sleep 10
          curl --fail ${{ secrets.K3S_URL }}/health